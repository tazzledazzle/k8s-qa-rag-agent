version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: indexer
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INDEXER_ALLOW_FILE_REMOTES: "true"
      INDEXER_ALLOWED_FILE_PATH_PREFIXES: /fixtures
    depends_on:
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/indexer:/app/services/indexer
      - ./tests/fixtures/sample-repo:/fixtures/sample-repo:ro
      - indexer_cache:/app/repos

  retriever:
    build:
      context: .
      dockerfile: services/retriever/Dockerfile
    container_name: retriever
    ports:
      - "8001:8001"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/retriever:/app/services/retriever

  qa-agent:
    build:
      context: .
      dockerfile: services/qa_agent/Dockerfile
    container_name: qa-agent
    ports:
      - "8002:8002"
    environment:
      RETRIEVER_HOST: retriever
      RETRIEVER_PORT: 8001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - retriever
    volumes:
      - ./services/qa_agent:/app/services/qa_agent

  git-watcher:
    build:
      context: .
      dockerfile: services/git-watcher/Dockerfile
    container_name: git-watcher
    ports:
      - "8003:8003"
    environment:
      INDEXER_HOST: indexer
      INDEXER_PORT: 8000
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-webhook-secret}
    depends_on:
      - indexer

volumes:
  qdrant_storage:
  indexer_cache:
