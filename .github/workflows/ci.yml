name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Lint with flake8
      run: |
        flake8 services tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 services tests --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    - name: Format check with black
      run: black --check services tests
    - name: Type check with mypy
      run: mypy services
    - name: Run pytest
      run: pytest tests/ -v --cov=services --cov-report=xml
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  otel-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - name: Validate OpenTelemetry Collector config
        run: bash scripts/validate-otel-config.sh

  git-watcher:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/git-watcher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Gradle test (git-watcher)
        run: gradle test --no-daemon

  build:
    needs: [test, git-watcher, otel-config]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v2
    - name: Build services
      working-directory: may-portfolio-projects/k8s-qa-rag-agent
      run: |
        docker build -f services/indexer/Dockerfile -t indexer:${{ github.sha }} .
        docker build -f services/retriever/Dockerfile -t retriever:${{ github.sha }} .
        docker build -f services/qa_agent/Dockerfile -t qa-agent:${{ github.sha }} .
        docker build -f services/git-watcher/Dockerfile -t git-watcher:${{ github.sha }} .
