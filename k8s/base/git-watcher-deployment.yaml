apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-watcher-deployment
  labels:
    app: git-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-watcher
  template:
    metadata:
      labels:
        app: git-watcher
    spec:
      containers:
      - name: git-watcher
        image: git-watcher:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8003
        env:
        - name: INDEXER_HOST
          value: "indexer-service"
        - name: INDEXER_PORT
          value: "8000"
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: github-secrets
              key: webhook-secret
              optional: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: git-watcher-service
  labels:
    app: git-watcher
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8003
    targetPort: 8003
  selector:
    app: git-watcher
