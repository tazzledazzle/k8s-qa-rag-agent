apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever-deployment
  labels:
    app: retriever
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retriever
  template:
    metadata:
      labels:
        app: retriever
    spec:
      containers:
      - name: retriever
        image: retriever:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8001
        env:
        - name: QDRANT_HOST
          value: "qdrant-service"
        - name: QDRANT_PORT
          value: "6333"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: CACHE_TTL_SECONDS
          value: "600"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: retriever-service
  labels:
    app: retriever
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8001
    targetPort: 8001
  selector:
    app: retriever
