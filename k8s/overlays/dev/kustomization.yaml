apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-system

bases:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: dev

# Override replicas for dev (minimal resources)
replicas:
  - name: dev-qa-agent-deployment
    count: 1
  - name: dev-retriever-deployment
    count: 1
  - name: dev-indexer-deployment
    count: 1
  - name: dev-git-watcher-deployment
    count: 1
  - name: dev-qdrant
    count: 1

# Patch resource limits for dev (smaller)
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-qa-agent-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dev-retriever-deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
